<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="一盤家常菜：帶皮蒸馬鈴薯、番茄、青菜與紅蘿蔔，冒著熱氣——好好吃一頓飯">
  <defs>
    <radialGradient id="pglow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f3d98a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f3d98a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="420" fill="#faf6ef"/>
  <ellipse cx="320" cy="232" rx="300" ry="180" fill="url(#pglow)"/>

  <!-- 熱氣 -->
  <g stroke="#b8a98a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4">
    <path d="M284 250 C274 224 294 212 284 186 C276 166 292 152 286 132"/>
    <path d="M330 244 C322 220 340 208 332 184 C326 166 340 152 336 134"/>
    <path d="M376 250 C368 226 386 214 378 190 C372 172 386 158 382 140"/>
  </g>

  <!-- 盤子 -->
