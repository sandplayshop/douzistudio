  <circle cx="438" cy="300" r="30" fill="#c5603f" stroke="#9c4429" stroke-width="2.4"/>
  <path d="M427 275 l6 8 5 -8 6 8 5 -7" fill="none" stroke="#6f7d52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="430" cy="292" r="5" fill="#e08a64" opacity="0.7"/>

  <!-- 帶皮蒸馬鈴薯(主角,左中) -->
  <ellipse cx="248" cy="300" rx="46" ry="34" fill="#cd9e6e" stroke="#9c7445" stroke-width="2.6"/>
  <g fill="#8c6a40"><circle cx="226" cy="294" r="2.6"/><circle cx="262" cy="308" r="2.4"/><circle cx="242" cy="286" r="2.2"/></g>
  <path d="M248 266 A46 34 0 0 1 290 304 A18 13 0 0 0 248 302 Z" fill="#e7c694" opacity="0.5"/>

