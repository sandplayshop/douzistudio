  <ellipse cx="320" cy="300" rx="170" ry="52" fill="none" stroke="#e2d5b8" stroke-width="1.6"/>

  <!-- 青菜(後) -->
  <g stroke="#5f6e44" stroke-width="1.6" stroke-linejoin="round">
    <path d="M352 288 C338 264 352 246 372 246 C392 246 404 266 392 288 C378 302 364 300 352 288 Z" fill="#6f7d52"/>
    <path d="M372 248 C374 264 374 278 372 288" fill="none" stroke="#52663a"/>
    <path d="M392 286 C404 270 418 264 430 266 C424 284 408 294 392 292 Z" fill="#8a9a63"/>
  </g>

