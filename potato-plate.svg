  <g stroke="#a5662a" stroke-width="1.2" opacity="0.6"><path d="M348 340 l-3 6"/><path d="M362 344 l-3 6"/></g>
  <path d="M328 340 c-10 -4 -18 -2 -24 4 m24 -4 c-8 -6 -16 -8 -24 -6" fill="none" stroke="#6f7d52" stroke-width="2" stroke-linecap="round"/>

  <g fill="#c2a14a" opacity="0.4"><circle cx="150" cy="202" r="2"/><circle cx="500" cy="202" r="1.8"/></g>
