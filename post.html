<style>
:root{
  --paper:#faf6ef; --paper2:#fffdf8; --paper3:#f3ecdf;
  --ink:#2a2420; --ink-soft:#5c5347; --muted:#978a74;
  --clay:#b9774a; --clay-deep:#9c5f38; --sprout:#6f7d52; --gold:#c2a14a; --accent:#5e6e3f;
  --line:rgba(42,36,32,.12); --line-soft:rgba(42,36,32,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper); color:var(--ink); font-family:"Noto Sans TC",sans-serif; line-height:1.85; -webkit-font-smoothing:antialiased; overflow-x:hidden}
body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background:radial-gradient(900px 500px at 78% -8%, rgba(194,161,74,.10), transparent 60%),radial-gradient(700px 600px at -10% 30%, rgba(185,119,74,.06), transparent 55%)}
.serif{font-family:"Noto Serif TC",serif}
.wrap{max-width:720px; margin:0 auto; padding:0 28px; position:relative; z-index:1}
a{color:inherit; text-decoration:none}

.nav{position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(250,246,239,.82); backdrop-filter:blur(12px); border-bottom:1px solid var(--line-soft)}
.nav-in{max-width:1000px; margin:0 auto; padding:15px 28px; display:flex; align-items:center; justify-content:space-between}
.brand{display:flex; align-items:center; gap:10px; font-family:"Noto Serif TC",serif; font-weight:700; font-size:18px; letter-spacing:.04em}
.brand svg{width:28px; height:28px; flex:none}
.nav-links{display:flex; gap:26px; font-size:14.5px; color:var(--ink-soft); font-weight:500}
.nav-links a:hover{color:var(--clay-deep)}

article{padding:130px 0 40px}
.back{display:inline-flex; align-items:center; gap:7px; font-size:14px; color:var(--muted); margin-bottom:30px; transition:.2s}
.back:hover{color:var(--clay-deep); gap:10px}
.a-meta{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px}
.a-tag{font-size:11.5px; letter-spacing:.04em; color:var(--accent); border:1px solid color-mix(in oklab,var(--accent) 40%,var(--line)); padding:2px 11px; border-radius:30px}
.a-date{font-size:13.5px; color:var(--muted); font-variant-numeric:tabular-nums}
.a-title{font-family:"Noto Serif TC",serif; font-weight:700; font-size:clamp(1.9rem,4.6vw,2.7rem); line-height:1.35; letter-spacing:.01em}
.a-excerpt{font-size:17px; color:var(--ink-soft); margin-top:18px; font-style:italic; padding-left:16px; border-left:3px solid color-mix(in oklab,var(--clay) 50%,var(--line))}
.a-cover{width:100%; border-radius:18px; margin-top:30px; display:block}
.a-sep{display:flex; align-items:center; gap:14px; margin:34px 0 6px; color:var(--muted)}
.a-sep::before,.a-sep::after{content:""; height:1px; flex:1; background:var(--line)}
.a-sep svg{width:22px; height:22px; opacity:.8}

/* prose */
.prose{font-size:17px; line-height:1.95; color:var(--ink); margin-top:14px}
.prose h1,.prose h2,.prose h3{font-family:"Noto Serif TC",serif; line-height:1.45; margin:1.6em 0 .55em; letter-spacing:.01em}
.prose h1{font-size:1.7rem} .prose h2{font-size:1.42rem} .prose h3{font-size:1.18rem}
.prose p{margin:1.05em 0}
.prose ul,.prose ol{margin:1.05em 0; padding-left:1.5em} .prose li{margin:.4em 0}
.prose blockquote{margin:1.4em 0; padding:.6em 1.3em; border-left:3px solid var(--clay); background:var(--paper3); border-radius:0 12px 12px 0; color:var(--ink-soft); font-style:italic}
.prose a{color:var(--clay-deep); text-decoration:underline; text-underline-offset:3px}
.prose img{max-width:100%; border-radius:14px; margin:1.4em 0}
.prose video{width:100%; border-radius:14px; margin:1.4em 0; display:block; background:#000}
.prose .embed{position:relative; width:100%; aspect-ratio:16/9; margin:1.4em 0; border-radius:14px; overflow:hidden; background:#000}
.prose .embed iframe{position:absolute; inset:0; width:100%; height:100%; border:0}
.prose code{background:var(--paper3); padding:.12em .42em; border-radius:6px; font-size:.9em}
.prose pre{background:#2a2420; color:#f3ead9; padding:18px 20px; border-radius:14px; overflow-x:auto; margin:1.4em 0}
.prose pre code{background:none; padding:0}
.prose hr{border:0; border-top:1px solid var(--line); margin:2em 0}
.prose strong{color:var(--ink); font-weight:700}

.a-foot{margin-top:54px; padding-top:30px; border-top:1px solid var(--line); text-align:center}
.a-foot .seed{width:40px; height:40px; opacity:.8; margin-bottom:12px}
.a-foot p{color:var(--muted); font-size:14px}
.a-foot a{color:var(--clay-deep); font-weight:500}
.state{padding:120px 0; text-align:center; color:var(--muted)}
.state svg{width:54px; height:54px; opacity:.7; margin-bottom:16px}
footer{border-top:1px solid var(--line); margin-top:20px; padding:36px 0; background:var(--paper2)}
.foot-in{max-width:720px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap}
.foot-in p{font-size:12.5px; color:var(--muted)}

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
marked.setOptions({breaks:true,gfm:true});
const MOCK={}; // 發佈前無示範文;發佈後 post 由後台 demo 文章(localStorage)帶入

function fmt(iso){ return (iso||'').slice(0,10).replace(/-/g,' · '); }
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function qs(k){return new URLSearchParams(location.search).get(k);}

async function load(){
  const slug=qs('slug');
  let lang=qs('lang');
  if(lang){ try{localStorage.setItem('xtlang',lang);}catch(e){} } else { try{lang=localStorage.getItem('xtlang')||'';}catch(e){} }
  lang = lang==='en'?'en':'';
  if(!slug){ return fail('沒有指定文章。'); }
  let post=null;
  try{
    const res=await fetch('/api/posts/'+encodeURIComponent(slug)+(lang?('?lang='+lang):''));
    const ct=res.headers.get('content-type')||'';
    if(res.ok && ct.includes('json')){ const d=await res.json(); post=d.post; }
    else if(res.status===404 && ct.includes('json')){ post=null; }   // 真 API 說沒這篇
    else throw 0;   // 靜態伺服器 / 無 API → 走 demo
  }catch(e){ post=demoPost(slug); }     // demo:讀後台寫的那篇
  if(!post) post=demoPost(slug);
  if(!post) return fail('找不到這一篇,也許它還在發芽,或被移走了。');
  render(post);
}
function demoPost(slug){
  if(window.XINTIAN_POSTS){
    const hit=window.XINTIAN_POSTS.find(x=>x.slug===slug);
    if(hit) return hit;
  }
  try{
    const a=JSON.parse(localStorage.getItem('xintian_mock_posts'))||[];
    const p=a.find(x=>x.slug===slug && x.status==='published');
    if(p) return {slug:p.slug,title:p.title,excerpt:p.excerpt,content_md:p.content_md,cover:p.cover,
      tags:(p.tags||'').split(',').map(t=>t.trim()).filter(Boolean),published_at:p.published_at,updated_at:p.updated_at};
  }catch(e){}
  return MOCK[slug]||null;
}
function fail(msg){
  document.title='找不到 · 農事筆記';
  document.getElementById('article').innerHTML=
    `<div class="state"><svg viewBox="0 0 40 40" fill="none"><path d="M8 32H32" stroke="#b98f5d" stroke-width="2" stroke-linecap="round"/><path d="M20 32V14" stroke="#6f7d52" stroke-width="2.2" stroke-linecap="round"/><circle cx="20" cy="11" r="3" fill="#cf8f5e"/></svg><div>${esc(msg)}</div><p style="margin-top:18px"><a href="diary.html" style="color:var(--clay-deep)">← 回農事筆記</a></p></div>`;
}
function render(p){
  document.title=p.title+' · 農事筆記';
  const tags=(p.tags||[]).map(t=>'<span class="a-tag">'+esc(t)+'</span>').join('');
  const cover=p.cover?`<img class="a-cover" src="${esc(p.cover)}" alt="">`:'';
  const ex=p.excerpt?`<p class="a-excerpt">${esc(p.excerpt)}</p>`:'';
  document.getElementById('article').innerHTML=`
    <a class="back" href="diary.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>回農事筆記</a>
    <div class="a-meta">${tags}<span class="a-date">${fmt(p.published_at)}</span></div>
    <h1 class="a-title serif">${esc(p.title)}</h1>
    ${ex}${cover}
    <div class="a-sep"><svg viewBox="0 0 40 40" fill="none"><path d="M8 30H32" stroke="#b98f5d" stroke-width="1.8" stroke-linecap="round"/><path d="M20 30V16" stroke="#6f7d52" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="13" r="2.6" fill="#c2a14a"/></svg></div>
    <div class="prose" id="prose"></div>
    <div class="a-foot">
      <svg class="seed" viewBox="0 0 40 40" fill="none"><path d="M8 32H32" stroke="#b98f5d" stroke-width="2" stroke-linecap="round"/><path d="M20 32C20 24 20 19 20 13" stroke="#6f7d52" stroke-width="2.2" stroke-linecap="round"/><path d="M20 23C13 23 9 19 8 13C15 13 19 17 20 23Z" fill="#6f7d52" opacity=".85"/><path d="M20 20C27 19 31 15 32 9C25 10 21 14 20 20Z" fill="#8a9a63"/><circle cx="20" cy="11" r="3" fill="#e7b659"/></svg>
      <p>讀到這裡,謝謝你。<br>下一畦長出來,我再寫信給你 —— <a href="index.html#sub">留個位子</a></p>
    </div>`;
  document.getElementById('prose').innerHTML=marked.parse(p.content_md||'');
}
load();
</script>
