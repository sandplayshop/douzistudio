<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="一個跪著的背影（自我），在一片溫柔的光裡，遇見一位矮小、慈祥、發著光的土地公（自性）。">
  <defs>
    <radialGradient id="tg-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6e3a6" stop-opacity="0.92"/>
      <stop offset="42%" stop-color="#e9c66a" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#e9c66a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tg-paper" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#c2a14a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c2a14a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="720" fill="#faf6ef"/>
  <ellipse cx="640" cy="320" rx="600" ry="360" fill="url(#tg-paper)"/>

  <!-- 自性之光 -->
  <ellipse cx="788" cy="392" rx="330" ry="300" fill="url(#tg-light)"/>
  <g fill="none" opacity="0.4" stroke-linecap="round">
    <circle cx="788" cy="392" r="150" stroke="#c2a14a" stroke-width="1.4"/>
    <circle cx="788" cy="392" r="210" stroke="#6f7d52" stroke-width="1.1" opacity="0.7"/>
    <circle cx="788" cy="392" r="266" stroke="#c2a14a" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- faint 田壟 -->
  <g stroke="#b98f5d" fill="none" stroke-linecap="round" opacity="0.45">
    <path d="M150 600 Q620 584 1080 600" stroke-width="2.2"/>
    <path d="M250 636 Q640 624 1010 636" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- ====== 土地公（自性）：矮小、慈祥、發光 ====== -->
  <g stroke="#5c4732" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- 袍身（矮圓） -->
    <path d="M712 566 C700 484 712 430 770 422 C828 430 840 484 828 566 Z" fill="#c98f5a"/>
    <!-- 袍襟線 -->
    <path d="M770 430 L770 560 M748 470 Q770 482 792 470" fill="none" stroke="#9c5f38" stroke-width="2"/>
    <!-- 左手托一團光 -->
    <path d="M716 486 C700 482 692 470 700 460 C714 456 726 466 730 478 Z" fill="#ecd6bb"/>
    <circle cx="704" cy="452" r="20" fill="#f3d98a" opacity="0.85"/>
    <circle cx="704" cy="452" r="20" fill="none" stroke="#d9b24e" stroke-width="1.4" opacity="0.6"/>
    <circle cx="704" cy="452" r="7" fill="#fff6df"/>
    <!-- 拐杖 -->
    <path d="M838 452 L850 566" stroke="#9c5f38" stroke-width="4"/>
    <path d="M838 452 q10 -8 18 -2" fill="none" stroke="#9c5f38" stroke-width="4"/>
    <!-- 頭 -->
    <circle cx="770" cy="392" r="32" fill="#ecd6bb"/>
    <!-- 帽（員外帽：圓頂＋兩側翅） -->
    <path d="M740 372 Q770 344 800 372 Z" fill="#6b513a" stroke="#5c4732"/>
    <path d="M740 372 L800 372" stroke="#5c4732" stroke-width="2.4"/>
    <ellipse cx="734" cy="376" rx="9" ry="5" fill="#6b513a" stroke="#5c4732" stroke-width="1.8"/>
    <ellipse cx="806" cy="376" rx="9" ry="5" fill="#6b513a" stroke="#5c4732" stroke-width="1.8"/>
    <!-- 笑眼 + 紅頰 -->
    <path d="M756 388 q4 -5 9 0 M775 388 q4 -5 9 0" fill="none" stroke="#5c4732" stroke-width="2.2"/>
    <circle cx="752" cy="398" r="4" fill="#d99a6c" opacity="0.5" stroke="none"/>
    <circle cx="788" cy="398" r="4" fill="#d99a6c" opacity="0.5" stroke="none"/>
    <!-- 白鬍子 -->
    <path d="M752 406 C756 446 784 446 788 406 C780 420 760 420 752 406 Z" fill="#efe7d8" stroke="#cbbfa8" stroke-width="1.6"/>
    <path d="M770 404 L770 438" stroke="#cbbfa8" stroke-width="1.4" fill="none"/>
  </g>

  <!-- ====== 自我：跪著的背影 ====== -->
  <g stroke="#5c4732" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- 跪姿袍身 -->
    <path d="M372 566 C360 520 360 484 392 470 C420 460 446 468 452 492 C462 524 460 548 456 566 Z" fill="#cf9b6e"/>
    <!-- 後腦（背影，低頭） -->
    <circle cx="404" cy="452" r="22" fill="#5c4732" stroke="none"/>
    <path d="M384 448 C392 436 416 436 424 448" fill="#5c4732" stroke="none"/>
  </g>

  <!-- 飄塵/夢的微光 -->
  <g fill="#c2a14a" opacity="0.45">
    <circle cx="560" cy="250" r="2.6"/><circle cx="900" cy="230" r="2.2"/>
    <circle cx="640" cy="180" r="1.8"/><circle cx="980" cy="320" r="1.6"/>
    <circle cx="540" cy="380" r="1.8"/><circle cx="700" cy="150" r="1.6"/>
  </g>
</svg>
